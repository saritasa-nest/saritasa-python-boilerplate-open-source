# UV docs for publishing
# https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi

name: Publish package to PyPI
description: "Publish package to PyPI."
inputs:
  python-version:
    description: "Version of python"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "${{ inputs.python-version }}"
        python-version-file: "pyproject.toml"
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Ensure tag matches pyproject version
      shell: bash
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION=$(uv version --short)
        echo "Tag: $TAG | pyproject: $VERSION"
        if [ "$TAG" != "$VERSION" ]; then
          echo "::error::Git tag ($TAG) does not match pyproject version ($VERSION)" >&2
          exit 1
        fi
        echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Build
      shell: bash
      run: uv build
    - name: Publish
      shell: bash
      run: uv publish
